# Sprint 1 acceptance corpus — labeled doc-class gold set.
#
# CURRENT STATE: 16 docs (5 real + 11 synthetic). Real-PDF sourcing
# attempted via scripts/source_real_pdfs.py — all 21 candidate URLs
# returned HTTP-200 HTML 404s or image-only scans (0/7 classes landed).
# Honest fallback: 5 additional synthetic variants per class. Production
# deployment expansion goes via reviewer-supplied real PDFs over time.
#
# Acceptance gates evaluated by tests/eval/test_doc_class_gate.py and the
# scripts/run_doc_class_eval.py harness (live API; ANTHROPIC_API_KEY required).

docs:
  # --- coordination_study (2 real + 1 synthetic + 1 scanned real) ---------
  - path: fixtures/pdfs/doc_a_60pct.pdf
    expected_class: coordination_study
    source: real
    notes: "Eaton sample coordination study; TCC curves on multiple pages"
  - path: fixtures/pdfs/doc_b_90pct.pdf
    expected_class: coordination_study
    source: real
    notes: "Mutated derivative of doc_a_60pct; same coordination-study shape"
  - path: fixtures/pdfs/doc_a_scanned.pdf
    expected_class: coordination_study
    source: real
    notes: "JPEG-encoded raster of doc_a_60pct; classifier reads page images directly"
  - path: fixtures/pdfs/synth_coordination_study_v2.pdf
    expected_class: coordination_study
    source: synthetic
    notes: "Schneider-style sample coord study; TCC1 with 8-row device table"

  # --- equipment_spec (3 synthetic across transformer/motor/switchgear) ---
  - path: fixtures/pdfs/spec_xfmr_001.pdf
    expected_class: equipment_spec
    source: synthetic
    notes: "IEEE C57.12.00 nameplate format (existing synthetic from v1)"
  - path: fixtures/pdfs/synth_equipment_spec_v2.pdf
    expected_class: equipment_spec
    source: synthetic
    notes: "Motor data sheet; ABB M3BP 75 kW; NEMA MG1 / IEC 60034"
  - path: fixtures/pdfs/synth_equipment_spec_v3.pdf
    expected_class: equipment_spec
    source: synthetic
    notes: "MV switchgear data sheet; Eaton VCP-W-1600; IEEE C37.20.2"

  # --- relay_setting_sheet (1 synthetic) ---------------------------------
  - path: fixtures/pdfs/synth_relay_setting_sheet.pdf
    expected_class: relay_setting_sheet
    source: synthetic
    notes: "SEL-787 transformer protection setting sheet; concrete setting tables"

  # --- hvac_schedule (2 synthetic — air-side + central plant) -------------
  - path: fixtures/pdfs/synth_hvac_schedule.pdf
    expected_class: hvac_schedule
    source: synthetic
    notes: "AHU / FCU / RTU / EF tabular schedule with ASHRAE refs"
  - path: fixtures/pdfs/synth_hvac_schedule_v2.pdf
    expected_class: hvac_schedule
    source: synthetic
    notes: "Central plant: chillers / boilers / pumps / cooling tower per ASHRAE 90.1"

  # --- pid (2 synthetic — reactor + heat-exchanger train) -----------------
  - path: fixtures/pdfs/synth_pid.pdf
    expected_class: pid
    source: synthetic
    notes: "ISA-5.1 instrument bubbles; reactor feed process"
  - path: fixtures/pdfs/synth_pid_v2.pdf
    expected_class: pid
    source: synthetic
    notes: "Parallel heat-exchanger train with safety interlocks + bypass loops"

  # --- bom (1 synthetic) -------------------------------------------------
  - path: fixtures/pdfs/synth_bom.pdf
    expected_class: bom
    source: synthetic
    notes: "Switchgear assembly BOM with manufacturer + part numbers"

  # --- civil_drawing (1 synthetic) ---------------------------------------
  - path: fixtures/pdfs/synth_civil_drawing.pdf
    expected_class: civil_drawing
    source: synthetic
    notes: "Grading plan with survey grid + contours + civil callouts"

  # --- unknown (2 real) --------------------------------------------------
  - path: fixtures/pdfs/real_sel_xfmr_protection.pdf
    expected_class: unknown
    source: real
    notes: "SEL conference paper — prose-heavy w/ abstract/intro/conclusions; no setting tables"
  - path: fixtures/pdfs/real_ieee_xfmr_spec_guide.pdf
    expected_class: unknown
    source: real
    notes: "IEEE Guide for transformer specification — standards-text guide, not a deliverable"

# Acceptance thresholds — 16-doc Sprint 1 corpus (5 real + 11 synthetic).
# Real-PDF expansion is a continuous reviewer-supplied workstream beyond
# Sprint 1. Synthetic-only-100% is the deliberate gate: we crafted these.
acceptance:
  overall_accuracy_min: 0.90       # ≥ 15 / 16
  real_only_accuracy_min: 0.80     # ≥ 4 / 5 real
  synthetic_only_accuracy_min: 1.00 # 11 / 11 synthetic — crafted, must hit
  unknown_precision_min: 1.00      # zero false-positive unknowns
